name: Lab 7
#TODO The pipeline should be triggered only on push to a "test" branch
on:
  # a comment
  push:
    branches:
      - test
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew -x build
      # TODO: Run backend tests in the pipeline
      - name: Run tests
        run: ./gradlew test
        env:
          MY_SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}

      # TODO: Run the Jacoco report in the pipeline (Jacoco already exists)
      - name: Run Jacoco report
        run: ./gradlew test jacocoTestReport

      # TODO: Set GitHub secrets and read them in the pipeline (for the environmentTest)
